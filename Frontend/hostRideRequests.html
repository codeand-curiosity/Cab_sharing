<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabify Host Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cabDark: "#0c1017",
                        cabPanel: "rgba(20, 26, 36, 0.86)",
                        cabLine: "#2a3546",
                        cabAccent: "#38bdf8"
                    }
                }
            }
        };
    </script>
    <style>
        .text-slate-100 {
            color: #ffffff !important;
        }

        .text-slate-300,
        .text-slate-400 {
            color: #d5deea !important;
        }

        .text-emerald-200,
        .text-sky-200,
        .text-rose-100,
        .text-rose-200 {
            color: #f8fbff !important;
        }
    </style>
</head>
<body class="min-h-screen bg-cabDark text-slate-100">
    <div id="hostRequestApp"></div>

    <script type="text/babel">
        const initialRequests = [
            {
                id: 1,
                name: "Arjun Mehra",
                pickup: "Boat Club",
                drop: "MP Nagar Zone 2",
                seats: 1,
                share: 90,
                gender: "male",
                rating: 4.4,
                status: "pending"
            },
            {
                id: 2,
                name: "Sana Khan",
                pickup: "New Market",
                drop: "DB Mall",
                seats: 2,
                share: 140,
                gender: "female",
                rating: 4.8,
                status: "pending"
            },
            {
                id: 3,
                name: "Nisha Patel",
                pickup: "Danish Kunj",
                drop: "Habibganj",
                seats: 1,
                share: 80,
                gender: "female",
                rating: 4.6,
                status: "pending"
            },
            {
                id: 4,
                name: "Rohit Sahu",
                pickup: "BHEL Gate",
                drop: "DB Mall",
                seats: 1,
                share: 75,
                gender: "male",
                rating: 2.8,
                status: "pending"
            },
            {
                id: 5,
                name: "Manav Jain",
                pickup: "10 No. Market",
                drop: "New Market",
                seats: 1,
                share: 65,
                gender: "male",
                rating: 2.6,
                status: "pending"
            }
        ];

        function HostRequestApp() {
            const [requests, setRequests] = React.useState(initialRequests);
            const [pinkRiderOnly, setPinkRiderOnly] = React.useState(false);
            const [rideInitialised, setRideInitialised] = React.useState(false);
            const [rideCompleted, setRideCompleted] = React.useState(false);
            const [hostRating, setHostRating] = React.useState(0);
            const [userRating, setUserRating] = React.useState(0);
            const visibleRequests = pinkRiderOnly
                ? requests.filter((request) => request.gender === "female" || (request.gender === "male" && request.rating > 3))
                : requests;
            const accepted = requests.filter((request) => request.status === "accepted");
            const pending = visibleRequests.filter((request) => request.status === "pending");
            const rejected = requests.filter((request) => request.status === "rejected");
            const collection = accepted.reduce((total, request) => total + request.share, 0);
            const activeRoute = {
                pickup: "Boat Club",
                drop: "MP Nagar Zone 2",
                stops: accepted.map((request) => request.pickup),
                distanceLeft: rideCompleted ? "0 km" : "5.8 km",
                nextStop: accepted[0]?.pickup || "First rider pickup",
                eta: rideCompleted ? "Completed" : "18 min",
                progress: rideCompleted ? "100%" : "62%"
            };

            function updateRequest(id, status) {
                setRequests((current) =>
                    current.map((request) =>
                        request.id === id ? { ...request, status } : request
                    )
                );
            }

            function initials(name) {
                return name
                    .split(" ")
                    .map((part) => part[0])
                    .join("")
                    .slice(0, 2);
            }

            function starText(rating) {
                return `${rating.toFixed(1)} stars`;
            }

            function RatingStars({ label, value, onChange }) {
                return (
                    <div className="rounded-xl border border-cabLine bg-[#101722]/90 p-4">
                        <p className="text-sm font-bold text-slate-300">{label}</p>
                        <div className="mt-3 flex gap-2">
                            {[1, 2, 3, 4, 5].map((star) => (
                                <button
                                    key={star}
                                    type="button"
                                    onClick={() => onChange(star)}
                                    className={`text-3xl leading-none transition ${star <= value ? "text-amber-300" : "text-slate-600 hover:text-amber-200"}`}
                                    aria-label={`${label} ${star} star${star > 1 ? "s" : ""}`}
                                >
                                    ★
                                </button>
                            ))}
                        </div>
                        <p className="mt-2 text-sm text-slate-400">{value > 0 ? `${value}/5 selected` : "Tap a star to rate"}</p>
                    </div>
                );
            }

            return (
                <main className="min-h-screen bg-[radial-gradient(circle_at_top_left,rgba(56,189,248,0.16),transparent_34rem),linear-gradient(135deg,#090d13,#0c1017_55%,#111827)] px-4 py-5 sm:px-8">
                    <header className="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 rounded-2xl border border-white/10 bg-white/10 px-5 py-4 shadow-2xl shadow-black/30 backdrop-blur-xl">
                        <a href="mainpage.html" className="rounded-full border border-white/10 bg-white/10 px-4 py-2 text-sm font-bold text-cabAccent transition hover:bg-white/15">Back to main page</a>
                        <div className="text-right">
                            <p className="text-sm text-slate-400">Hosted route</p>
                            <h1 className="text-xl font-black tracking-normal sm:text-2xl">Bhopal route requests</h1>
                        </div>
                    </header>

                    <section className="mx-auto mt-5 grid max-w-6xl gap-3 sm:grid-cols-3">
                        <div className="rounded-2xl border border-white/10 bg-white/10 p-4 backdrop-blur-xl">
                            <p className="text-sm text-slate-400">Pending</p>
                            <strong className="mt-1 block text-3xl font-black">{pending.length}</strong>
                        </div>
                        <div className="rounded-2xl border border-white/10 bg-white/10 p-4 backdrop-blur-xl">
                            <p className="text-sm text-slate-400">Accepted riders</p>
                            <strong className="mt-1 block text-3xl font-black">{accepted.length}</strong>
                        </div>
                        <div className="rounded-2xl border border-white/10 bg-white/10 p-4 backdrop-blur-xl">
                            <p className="text-sm text-slate-400">Collection</p>
                            <strong className="mt-1 block text-3xl font-black">Rs {collection}</strong>
                        </div>
                    </section>

                    {rideInitialised && (
                        <section className="mx-auto mt-5 max-w-6xl overflow-hidden rounded-3xl border border-white/10 bg-[linear-gradient(135deg,rgba(56,189,248,0.18),rgba(16,23,34,0.94))] p-5 shadow-2xl shadow-black/30 backdrop-blur-xl">
                            <div className="flex flex-wrap items-start justify-between gap-4">
                                <div>
                                    <p className="text-sm font-bold text-cabAccent">{rideCompleted ? "Ride completed" : "Ride live"}</p>
                                    <h2 className="mt-1 text-3xl font-black">Current route </h2>
                                    <p className="mt-2 max-w-2xl text-sm leading-6 text-slate-300">
                                        Track the host route, accepted users, next stop, remaining distance, and ride completion from one place.
                                    </p>
                                </div>
                                <button
                                    type="button"
                                    disabled={rideCompleted}
                                    onClick={() => setRideCompleted(true)}
                                    className="min-h-12 rounded-xl bg-emerald-300 px-5 font-black text-slate-950 shadow-xl shadow-emerald-400/20 transition enabled:hover:bg-emerald-200 disabled:cursor-not-allowed disabled:opacity-60"
                                >
                                    {rideCompleted ? "Ride completed" : "Complete ride"}
                                </button>
                            </div>

                            <div className="mt-5 grid gap-4 lg:grid-cols-[1.1fr_0.9fr]">
                                <div className="rounded-2xl border border-white/10 bg-[#101722]/90 p-5">
                                    <div className="flex items-center justify-between gap-3">
                                        <div>
                                            <p className="text-sm text-slate-400">Route</p>
                                            <strong className="text-xl">{activeRoute.pickup} to {activeRoute.drop}</strong>
                                        </div>
                                        <span className="rounded-full bg-sky-300 px-3 py-1 text-sm font-black text-slate-950">{activeRoute.eta}</span>
                                    </div>
                                    <div className="mt-5 h-3 overflow-hidden rounded-full bg-white/10">
                                        <div className="h-full rounded-full bg-gradient-to-r from-emerald-300 to-sky-300" style={{ width: activeRoute.progress }}></div>
                                    </div>
                                    <div className="mt-5 grid gap-3 sm:grid-cols-3">
                                        <div className="rounded-xl bg-white/10 p-4">
                                            <p className="text-sm text-slate-400">Distance left</p>
                                            <strong className="mt-1 block text-2xl">{activeRoute.distanceLeft}</strong>
                                        </div>
                                        <div className="rounded-xl bg-white/10 p-4">
                                            <p className="text-sm text-slate-400">Next stop</p>
                                            <strong className="mt-1 block text-lg">{activeRoute.nextStop}</strong>
                                        </div>
                                        <div className="rounded-xl bg-white/10 p-4">
                                            <p className="text-sm text-slate-400">Riders onboard</p>
                                            <strong className="mt-1 block text-2xl">{accepted.length}</strong>
                                        </div>
                                    </div>
                                </div>

                                <div className="rounded-2xl border border-white/10 bg-[#101722]/90 p-5">
                                    <div className="flex items-center justify-between gap-3">
                                        <h3 className="text-lg font-black">Users on this ride</h3>
                                        <span className="text-sm text-slate-400">{accepted.length} accepted</span>
                                    </div>
                                    <div className="mt-4 grid gap-3">
                                        {accepted.length === 0 ? (
                                            <p className="rounded-xl border border-cabLine p-4 text-sm text-slate-400">Accept at least one user to start seeing riders here.</p>
                                        ) : (
                                            accepted.map((request) => (
                                                <div key={request.id} className="flex items-center justify-between gap-3 rounded-xl border border-cabLine p-4">
                                                    <div className="flex items-center gap-3">
                                                        <div className="grid h-10 w-10 shrink-0 place-items-center rounded-full bg-sky-300 font-black text-slate-950">{initials(request.name)}</div>
                                                        <div>
                                                            <strong>{request.name}</strong>
                                                            <p className="text-sm text-slate-400">{request.pickup} to {request.drop}</p>
                                                            <p className="text-xs font-bold text-amber-200">{starText(request.rating)} · {request.gender}</p>
                                                        </div>
                                                    </div>
                                                    <span className={`rounded-full px-3 py-1 text-xs font-bold ${rideCompleted ? "bg-sky-400/15 text-sky-200" : "bg-emerald-400/15 text-emerald-200"}`}>
                                                        {rideCompleted ? "Complete" : "On route"}
                                                    </span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>

                            {rideCompleted && (
                                <div className="mt-5 rounded-2xl border border-amber-200/20 bg-amber-300/10 p-5">
                                    <div>
                                        <p className="text-sm font-bold text-amber-200">Ride feedback</p>
                                        <h3 className="mt-1 text-2xl font-black">Rate your ride experience</h3>
                                    </div>
                                    <div className="mt-4 grid gap-4 md:grid-cols-2">
                                        <RatingStars label="Rate host" value={hostRating} onChange={setHostRating} />
                                        <RatingStars label="Rate user" value={userRating} onChange={setUserRating} />
                                    </div>
                                </div>
                            )}
                        </section>
                    )}

                    <section className="mx-auto mt-5 grid max-w-6xl gap-5 lg:grid-cols-[1.15fr_0.85fr]">
                        <section className="rounded-2xl border border-white/10 bg-cabPanel p-5 shadow-2xl shadow-black/30 backdrop-blur-xl">
                            <div className="flex flex-wrap items-end justify-between gap-3">
                                <div>
                                    <p className="text-sm font-bold text-cabAccent">New user requests</p>
                                    <h2 className="mt-1 text-2xl font-black">Accept or reject riders</h2>
                                    <p className="mt-2 text-sm text-slate-400">Pink rider shows female requests and male riders rated above 3 stars.</p>
                                </div>
                                <div className="flex flex-wrap items-center gap-2">
                                    <button
                                        type="button"
                                        onClick={() => setPinkRiderOnly((current) => !current)}
                                        className={`rounded-full border px-4 py-2 text-sm font-black transition ${pinkRiderOnly ? "border-pink-300 bg-pink-300 text-slate-950" : "border-cabLine bg-white/10 text-slate-100 hover:bg-white/15"}`}
                                    >
                                        Pink rider
                                    </button>
                                    <span className="rounded-full border border-cabLine px-3 py-1 text-sm text-slate-300">{pending.length} pending</span>
                                </div>
                            </div>

                            <div className="mt-5 grid gap-3">
                                {visibleRequests.length === 0 ? (
                                    <p className="rounded-xl border border-cabLine bg-[#101722]/90 p-4 text-sm text-slate-400">No requests match the Pink rider filter.</p>
                                ) : visibleRequests.map((request) => (
                                    <article key={request.id} className="rounded-xl border border-cabLine bg-[#101722]/90 p-4 transition hover:-translate-y-0.5 hover:border-sky-300/50">
                                        <div className="flex flex-wrap items-start justify-between gap-4">
                                            <div className="flex gap-3">
                                                <div className="grid h-12 w-12 shrink-0 place-items-center rounded-full bg-gradient-to-br from-sky-300 to-emerald-300 font-black text-slate-950">
                                                    {initials(request.name)}
                                                </div>
                                                <div>
                                                    <h3 className="text-lg font-black">{request.name}</h3>
                                                    <p className="mt-1 text-sm text-slate-400">{request.pickup} to {request.drop}</p>
                                                    <p className="mt-1 text-xs font-bold text-amber-200">{starText(request.rating)} · {request.gender}</p>
                                                    <div className="mt-3 flex items-center gap-2 text-xs text-slate-400">
                                                        <span className="h-2 w-2 rounded-full bg-emerald-400"></span>
                                                        <span>{request.pickup}</span>
                                                        <span className="h-px w-8 bg-cabLine"></span>
                                                        <span className="h-2 w-2 rounded-full bg-sky-400"></span>
                                                        <span>{request.drop}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex min-w-[150px] flex-col items-start gap-3 sm:items-end">
                                                <div className="mt-3 flex flex-wrap gap-2 text-xs font-bold text-slate-300">
                                                    <span className="rounded-full bg-white/10 px-3 py-1">{request.seats} seat{request.seats > 1 ? "s" : ""}</span>
                                                    <span className="rounded-full bg-white/10 px-3 py-1">Share Rs {request.share}</span>
                                                    <span className={`rounded-full px-3 py-1 ${request.status === "accepted" ? "bg-emerald-500/20 text-emerald-200" : request.status === "rejected" ? "bg-rose-500/20 text-rose-200" : "bg-sky-500/20 text-sky-200"}`}>
                                                        {request.status}
                                                    </span>
                                                </div>

                                                <div className="flex gap-2">
                                                    <button
                                                        type="button"
                                                        onClick={() => updateRequest(request.id, "accepted")}
                                                        className="min-h-10 rounded-lg bg-emerald-400 px-4 text-sm font-black text-slate-950 transition hover:bg-emerald-300"
                                                    >
                                                        Accept
                                                    </button>
                                                    <button
                                                        type="button"
                                                        onClick={() => updateRequest(request.id, "rejected")}
                                                        className="min-h-10 rounded-lg border border-rose-300/30 bg-rose-500/12 px-4 text-sm font-black text-rose-100 transition hover:bg-rose-500/20"
                                                    >
                                                        Reject
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        </section>

                        <aside className="grid content-start gap-5 lg:sticky lg:top-5">
                            <section className="rounded-2xl border border-white/10 bg-cabPanel p-5 shadow-2xl shadow-black/30 backdrop-blur-xl">
                                <p className="text-sm font-bold text-cabAccent">Collection share</p>
                                <div className="mt-3 rounded-xl border border-cabLine bg-[#101722]/90 p-5">
                                    <p className="text-sm text-slate-400">Accepted riders total</p>
                                    <strong className="mt-1 block text-4xl font-black">Rs {collection}</strong>
                                    <p className="mt-2 text-sm text-slate-400">{accepted.length} accepted, {rejected.length} rejected</p>
                                </div>
                            </section>

                            <section className="rounded-2xl border border-white/10 bg-cabPanel p-5 shadow-2xl shadow-black/30 backdrop-blur-xl">
                                <div className="flex items-center justify-between gap-3">
                                    <h2 className="text-lg font-black">Accepted users</h2>
                                    <span className="text-sm text-slate-400">{accepted.length} riders</span>
                                </div>

                                <div className="mt-4 grid gap-3">
                                    {accepted.length === 0 ? (
                                        <p className="rounded-xl border border-cabLine bg-[#101722]/90 p-4 text-sm text-slate-400">No users accepted yet.</p>
                                    ) : (
                                        accepted.map((request) => (
                                            <div key={request.id} className="flex gap-3 rounded-xl border border-cabLine bg-[#101722]/90 p-4">
                                                <div className="grid h-10 w-10 shrink-0 place-items-center rounded-full bg-emerald-300 font-black text-slate-950">{initials(request.name)}</div>
                                                <div>
                                                    <strong>{request.name}</strong>
                                                    <p className="mt-1 text-sm text-slate-400">{request.pickup} to {request.drop}</p>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </section>

                            <button
                                type="button"
                                disabled={accepted.length === 0 || rideInitialised}
                                onClick={() => setRideInitialised(true)}
                                className="min-h-14 rounded-xl bg-gradient-to-br from-sky-300 to-sky-500 px-5 font-black text-slate-950 shadow-xl shadow-sky-500/20 transition enabled:hover:from-sky-200 disabled:cursor-not-allowed disabled:opacity-45"
                            >
                                {rideInitialised ? "Ride initialised" : "Initialise ride"}
                            </button>
                        </aside>
                    </section>
                </main>
            );
        }

        ReactDOM.createRoot(document.querySelector("#hostRequestApp")).render(<HostRequestApp />);
    </script>
</body>
</html>
